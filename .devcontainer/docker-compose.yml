services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas-app
    ports:
      - "8080:80"
      - "4200:4200"
    volumes:
      - ..:/workspace:cached
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=saas_api
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy
    networks:
      - saas-network
    command: sleep infinity

  db:
    image: postgres:16-alpine
    container_name: saas-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: saas_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - saas-network

volumes:
  postgres-data:

networks:
  saas-network:
    driver: bridge
